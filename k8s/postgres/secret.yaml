apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: task-manager
type: Opaque
# IMPORTANT: Replace these values before deploying to production.
# Use AWS Secrets Manager + External Secrets Operator, or Sealed Secrets,
# rather than committing real credentials to source control.
stringData:
  POSTGRES_DB: task_manager
  POSTGRES_USER: task_manager
  POSTGRES_PASSWORD: CHANGE_ME_IN_PRODUCTION
