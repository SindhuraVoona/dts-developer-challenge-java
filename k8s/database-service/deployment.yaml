apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database-service
  template:
    metadata:
      labels:
        app: database-service
    spec:
      initContainers:
        # Wait until postgres is accepting connections before starting
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 3; done']
      containers:
        - name: database-service
          # Replace with your ECR image URI, e.g.:
          # 123456789012.dkr.ecr.eu-west-2.amazonaws.com/database-service:latest
          image: database-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: database-service-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /internal/tasks
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /internal/tasks
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
