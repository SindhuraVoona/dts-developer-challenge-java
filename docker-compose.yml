services:
  postgres:
    image: postgres:17-alpine
    container_name: task-manager-postgres
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: task_manager
      POSTGRES_PASSWORD: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_manager -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  database-service:
    build:
      context: .
      dockerfile: database-service/Dockerfile
    container_name: task-manager-database-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/task_manager
      SPRING_DATASOURCE_USERNAME: task_manager
      SPRING_DATASOURCE_PASSWORD: task_manager
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/internal/tasks || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: task-manager-backend
    ports:
      - "8080:8080"
    environment:
      SERVICES_DATABASE_SERVICE_BASE_URL: http://database-service:8081
    depends_on:
      database-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
