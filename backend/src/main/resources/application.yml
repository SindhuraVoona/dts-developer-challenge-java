spring:
  application:
    name: backend-service

services:
  database-service:
    base-url: http://localhost:8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      database-service:
        # Open circuit after 50 % failures in a 10-call sliding window
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        # Stay OPEN for 15 s, then allow half-open probe calls
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        # TaskNotFoundException is a business 404 — don't count it as a circuit failure
        ignore-exceptions:
          - uk.gov.hmcts.dts.taskmanager.exception.TaskNotFoundException
        register-health-indicator: true
  timelimiter:
    instances:
      database-service:
        timeout-duration: 5s
