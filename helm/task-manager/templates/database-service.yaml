apiVersion: v1
kind: ConfigMap
metadata:
  name: database-service-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/{{ .Values.postgres.credentials.database }}"
  SPRING_JPA_HIBERNATE_DDL_AUTO: validate
  SPRING_LIQUIBASE_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
    {{- include "task-manager.selectorLabels" (dict "root" . "component" "database-service") | nindent 4 }}
spec:
  replicas: {{ .Values.databaseService.replicaCount }}
  selector:
    matchLabels:
      {{- include "task-manager.selectorLabels" (dict "root" . "component" "database-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "task-manager.selectorLabels" (dict "root" . "component" "database-service") | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 3; done']
      containers:
        - name: database-service
          image: "{{ .Values.databaseService.image.repository }}:{{ .Values.databaseService.image.tag }}"
          imagePullPolicy: {{ .Values.databaseService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.databaseService.port }}
          envFrom:
            - configMapRef:
                name: database-service-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /internal/tasks
              port: {{ .Values.databaseService.port }}
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /internal/tasks
              port: {{ .Values.databaseService.port }}
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            {{- toYaml .Values.databaseService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: database-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "task-manager.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "task-manager.selectorLabels" (dict "root" . "component" "database-service") | nindent 4 }}
  ports:
    - port: {{ .Values.databaseService.port }}
      targetPort: {{ .Values.databaseService.port }}
  type: ClusterIP
